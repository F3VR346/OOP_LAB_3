<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Все персонажи</title>
    <style>
        body{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#eee;font-family:Segoe UI,sans-serif;padding:20px}
        h1{text-align:center;color:#4ecdc4}
        .nav{text-align:center;margin-bottom:30px}
        .nav a{display:inline-block;margin:0 10px;padding:10px 20px;background:#4ecdc4;color:#1a1a2e;text-decoration:none;border-radius:8px}
        table{width:100%;border-collapse:collapse;background:rgba(255,255,255,0.1);border-radius:15px}
        th,td{padding:12px;border-bottom:1px solid rgba(255,255,255,0.2)}
        th{background:rgba(0,0,0,0.3)}
        .btn{padding:5px 10px;border:none;border-radius:5px;cursor:pointer;text-decoration:none;display:inline-block;font-size:12px}
        .btn-danger{background:#ff6b6b;color:white}
        .btn-info{background:#6c5ce7;color:white}
        .btn-primary{background:#4ecdc4;color:#1a1a2e}
        .btn-log{background:#ffd93d;color:#1a1a2e}
        .stats-panel{
            background:rgba(0,0,0,0.95);
            padding:20px;
            border-radius:15px;
            margin-top:20px;
            white-space:pre-wrap;
            font-family:monospace;
            position:fixed;
            bottom:20px;
            right:20px;
            width:450px;
            z-index:1000;
            border:2px solid #4ecdc4;
            box-shadow:0 0 20px rgba(0,0,0,0.5);
            max-height:80vh;
            overflow:auto;
        }
        .close-btn{
            float:right;
            background:#ff6b6b;
            border:none;
            color:white;
            padding:5px 10px;
            border-radius:5px;
            cursor:pointer;
        }
        .action-btn{
            margin:5px;
            padding:10px 15px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }
        .modal{
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            background:#1a1a2e;
            border:3px solid #4ecdc4;
            border-radius:20px;
            padding:25px;
            z-index:2000;
            min-width:400px;
            max-width:600px;
            box-shadow:0 0 50px rgba(0,0,0,0.8);
        }
        .modal-overlay{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.7);
            z-index:1999;
        }
        .btn-ok{
            background:#4ecdc4;
            border:none;
            padding:10px 20px;
            border-radius:8px;
            margin-top:15px;
            cursor:pointer;
            font-weight:bold;
        }
        hr{margin:10px 0;border-color:#333}
        .refresh-btn{
            background:#4ecdc4;
            border:none;
            padding:8px 15px;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
            margin-left:10px;
        }
        .action-buttons-group{
            display:flex;
            gap:5px;
            flex-wrap:wrap;
        }
    </style>
</head>
<body>
<div>
    <h1>⚔️ Управление персонажами MMORPG 🧙</h1>
    <div class="nav">
        <a href="/characters">Все</a>
        <a href="/characters/summoners">🔮 Призыватели</a>
        <a href="/characters/paladins">⚔️ Паладины</a>
        <a href="/players">👥 Игроки</a>
        <button class="refresh-btn" onclick="refreshTable()">🔄 Обновить таблицу</button>
    </div>

    <div th:if="${success}" style="background:#00b894;padding:10px;border-radius:8px;margin-bottom:20px">
        ✅ <span th:text="${success}"></span>
    </div>
    <div th:if="${error}" style="background:#ff6b6b;padding:10px;border-radius:8px;margin-bottom:20px">
        ⚠️ <span th:text="${error}"></span>
    </div>

    <div id="tableContainer">
        <table id="charactersTable">
            <thead>
            <tr><th>Тип</th><th>ID</th><th>Имя</th><th>Уровень</th><th>Здоровье</th><th>Действия</th></tr>
            </thead>
            <tbody id="tableBody">
            <tr th:each="c : ${characters}">
                <td th:text="${c.getClass().getSimpleName() == 'Summoner'} ? '🔮' : '⚔️'"></td>
                <td th:text="${c.id}"></td>
                <td th:text="${c.name}"></td>
                <td th:text="${c.level}"></td>
                <td th:text="${c.health}"></td>
                <td class="action-buttons-group">
                    <a th:href="|/characters/edit/${c.getClass().getSimpleName() == 'Summoner' ? 'summoner' : 'paladin'}/${c.id}|"
                       class="btn btn-primary">✏️</a>
                    <a th:href="@{/characters/delete/summoner/{id}(id=${c.id})}" class="btn btn-danger" th:if="${c.getClass().getSimpleName() == 'Summoner'}" onclick="return confirm('Удалить призывателя?')">🗑️</a>
                    <a th:href="@{/characters/delete/paladin/{id}(id=${c.id})}" class="btn btn-danger" th:if="${c.getClass().getSimpleName() == 'Paladin'}" onclick="return confirm('Удалить паладина?')">🗑️</a>

                    <button type="button" class="btn btn-info"
                            th:data-id="${c.id}"
                            th:data-name="${c.name}"
                            th:data-type="${c.getClass().getSimpleName() == 'Summoner' ? 'summoner' : 'paladin'}"
                            onclick="showStats(this)">📊 Статы</button>

                    <a th:href="@{'/characters/logs/' + ${c.id}}" class="btn btn-log">📜 Логи</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div id="actionsPanel" class="stats-panel" style="display:none">
        <button class="close-btn" onclick="closePanel()">✖</button>
        <h3>🎮 Действия с персонажем</h3>
        <div id="characterInfo"></div>
        <div id="actionButtons"></div>
        <div id="actionResult" style="margin-top:15px;padding:10px;background:rgba(0,0,0,0.5);border-radius:8px"></div>
    </div>
</div>

<script>
    let currentId = null;
    let currentType = null;
    let currentName = null;
    let currentRow = null;

    function refreshTable() {
        fetch('/characters/api/table')
            .then(response => response.text())
            .then(html => {
                document.getElementById('tableContainer').innerHTML = html;
                attachEvents();
            });
    }

    function attachEvents() {
        document.querySelectorAll('#tableBody .btn-info').forEach(btn => {
            btn.onclick = function() { showStats(this); };
        });
    }

    function showStats(button) {
        currentId = button.getAttribute('data-id');
        currentType = button.getAttribute('data-type');
        currentName = button.getAttribute('data-name');
        currentRow = button.closest('tr');

        document.getElementById('actionsPanel').style.display = 'block';

        fetch('/characters/action/' + currentType + '/' + currentId + '?action=getStats', { method: 'POST' })
            .then(response => response.text())
            .then(data => {
                document.getElementById('characterInfo').innerHTML = '<pre style="margin:0">' + data + '</pre>';
                loadActionButtons();
            });
    }

    function loadActionButtons() {
        let buttons = '';

        buttons += '<button class="action-btn" style="background:#ffd93d;color:#1a1a2e" onclick="doAction(\'takeDamage\',30)">💔 TakeDamage (30 урона)</button>';
        buttons += '<button class="action-btn" style="background:#00b894;color:white" onclick="doAction(\'levelUp\')">⬆️ LevelUp (+1 уровень)</button>';
        buttons += '<button class="action-btn" style="background:#6c5ce7;color:white" onclick="doAction(\'specialAction\')">⭐ SpecialAction</button>';

        if (currentType === 'summoner') {
            buttons += '<hr>';
            buttons += '<button class="action-btn" style="background:#4ecdc4;color:#1a1a2e" onclick="doAction(\'castSpell\')">✨ CastSpell (Огненный шар)</button>';
            buttons += '<button class="action-btn" style="background:#4ecdc4;color:#1a1a2e" onclick="doAction(\'summonCreature\')">🐉 SummonCreature (Призыв)</button>';
            buttons += '<button class="action-btn" style="background:#4ecdc4;color:#1a1a2e" onclick="doAction(\'regenerateMana\',50)">💙 RegenerateMana (+50 маны)</button>';
        } else {
            buttons += '<hr>';
            buttons += '<button class="action-btn" style="background:#ff6b6b;color:white" onclick="doAction(\'shieldWall\')">🛡️ ShieldWall (Защита)</button>';
            buttons += '<button class="action-btn" style="background:#ff6b6b;color:white" onclick="doAction(\'holyStrike\')">⚡ HolyStrike (Удар)</button>';
            buttons += '<button class="action-btn" style="background:#ff6b6b;color:white" onclick="doAction(\'increaseArmor\',20)">🛡️ IncreaseArmor (+20 брони)</button>';
        }

        document.getElementById('actionButtons').innerHTML = buttons;
    }

    function doAction(action, value) {
        let url = '/characters/action/' + currentType + '/' + currentId + '?action=' + action;
        if (value) url += '&value=' + value;

        fetch(url, { method: 'POST' })
            .then(response => response.text())
            .then(data => {
                if (data.startsWith('error:')) {
                    let errorMsg = data.substring(6);
                    document.getElementById('actionResult').innerHTML = '<div style="color:#ff6b6b">❌ ' + errorMsg + '</div>';
                    showDialog(action, errorMsg, true);
                } else {
                    document.getElementById('actionResult').innerHTML = '<div style="color:#4ecdc4">✅ Успешно!</div>';
                    document.getElementById('characterInfo').innerHTML = '<pre style="margin:0">' + data + '</pre>';
                    showDialog(action, data, false);
                    refreshTable();
                }
            });
    }

    function showDialog(action, message, isError) {
        let actionNames = {
            'takeDamage': '💔 Получение урона',
            'levelUp': '⬆️ Повышение уровня',
            'specialAction': '⭐ Специальное действие',
            'castSpell': '✨ Заклинание',
            'summonCreature': '🐉 Призыв существа',
            'regenerateMana': '💙 Восстановление маны',
            'shieldWall': '🛡️ Стена щита',
            'holyStrike': '⚡ Священный удар',
            'increaseArmor': '🛡️ Увеличение брони'
        };

        let title = actionNames[action] || 'Действие выполнено';
        let borderColor = isError ? '#ff6b6b' : '#4ecdc4';
        let icon = isError ? '❌' : '✅';

        let overlay = document.createElement('div');
        overlay.className = 'modal-overlay';

        let modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.borderColor = borderColor;

        modal.innerHTML = `
            <div style="text-align:right">
                <button onclick="this.parentElement.parentElement.remove();document.querySelector('.modal-overlay').remove()" style="background:#ff6b6b;border:none;color:white;padding:5px 10px;border-radius:5px;cursor:pointer">✖</button>
            </div>
            <h2 style="color:${borderColor};margin-top:0">${icon} ${title}</h2>
            <pre style="background:rgba(0,0,0,0.5);padding:15px;border-radius:10px;color:#eee;font-family:monospace;max-height:300px;overflow:auto">${message}</pre>
            <button class="btn-ok" onclick="this.parentElement.remove();document.querySelector('.modal-overlay').remove()">OK</button>
        `;

        document.body.appendChild(overlay);
        document.body.appendChild(modal);

        overlay.onclick = function() {
            modal.remove();
            overlay.remove();
        };
    }

    function closePanel() {
        document.getElementById('actionsPanel').style.display = 'none';
        currentId = null;
        currentType = null;
    }

    document.addEventListener('DOMContentLoaded', function() {
        attachEvents();
    });
</script>
</body>
</html>
